name: Diagnostics Worker

on:
  push:
    branches:
      - main
    paths:
      - worker/**
      - .github/workflows/diagnostics-worker.yml
      - package.json
      - package-lock.json
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  deploy:
    name: Deploy diagnostics collector
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_DIAGNOSTICS_WORKER_DEPLOY == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Worker secrets
        run: |
          node -e "require('fs').writeFileSync(process.env.RUNNER_TEMP + '/diagnostics-worker-secrets.json', JSON.stringify({ READ_TOKEN: process.env.DIAGNOSTICS_READ_TOKEN }))"
        env:
          DIAGNOSTICS_READ_TOKEN: ${{ secrets.DIAGNOSTICS_READ_TOKEN }}

      - name: Deploy Worker
        run: npx wrangler deploy --config worker/wrangler.jsonc --keep-vars --secrets-file "$RUNNER_TEMP/diagnostics-worker-secrets.json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
