name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24
  VITE_BASE_PATH: /neon-drift-web/

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

  e2e:
    name: Playwright E2E (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: menu-tutorial
            grep: 'lays out|plays s&box|replays the tutorial'
          - shard: controls
            grep: 'mobile event strip|simplified mobile|clears held keyboard'
          - shard: race-render-audio
            grep: 'playable 3D race|source-authored stunt|race audio'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e shard against production build
        run: npm run e2e -- --grep "${{ matrix.grep }}"
        env:
          PLAYWRIGHT_USE_BUILD: 'true'
          PLAYWRIGHT_TEST_TIMEOUT: '90000'

      - name: Upload e2e failure artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-e2e-${{ matrix.shard }}
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:client

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.repository.private == false || vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true')
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.repository.private == false || vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true')
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - typecheck
      - lint
      - unit
      - e2e
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (github.event.repository.private == false || vars.ENABLE_GITHUB_PAGES_DEPLOY == 'true')
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
